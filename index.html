<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- iOS 26 Safari critical viewport fix - remove interactive-widget that breaks iOS 26 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Trendify - Creative Digital Marketing &amp; Development Agency</title>
    <meta name="description" content="Trendify is a leading digital marketing and creative services agency specializing in SEO, web development, graphic design, social media management, and innovative digital solutions.">
    <meta name="keywords" content="digital marketing, SEO, web development, graphic design, social media management, content creation, digital agency, Trendify">
    <meta name="author" content="Trendify Creative Hub" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Trendify - Creative Digital Marketing & Development Agency" />
    <meta property="og:description" content="Transform your digital presence with Trendify's innovative marketing solutions, cutting-edge web development, and creative design services." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/xQl55EIDY6U5FPZIuIyVYXyHYIh2/social-images/social-1757568772893-Screenshot 2025-09-11 083103.png">
    <meta property="og:url" content="https://trendify.lovable.app" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@trendify_agency" />
    <meta name="twitter:title" content="Trendify - Creative Digital Marketing Agency" />
    <meta name="twitter:description" content="Innovative digital marketing, web development, and creative services that drive results." />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/xQl55EIDY6U5FPZIuIyVYXyHYIh2/social-images/social-1757568772893-Screenshot 2025-09-11 083103.png">

    <!-- Fonts - iOS Optimized -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      /* iOS 26 Safari CRITICAL fixes - VisualViewport API bug workaround */
      * {
        box-sizing: border-box;
      }
      
      html {
        height: 100%;
        position: fixed;
        width: 100%;
        overflow: hidden;
      }
      
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: auto;
        position: relative;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Tajawal', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
      }
      
      #root {
        min-height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      
      /* Prevent FOUT on iOS */
      .font-arabic {
        font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif;
        font-display: swap;
      }
      
      /* iOS 26 Safari VisualViewport fix */
      @supports (-webkit-touch-callout: none) {
        html {
          position: fixed;
          overflow: hidden;
        }
        body {
          position: relative;
          overflow-y: auto;
          overflow-x: hidden;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://trendify.lovable.app" />
    <link rel="icon" type="image/x-icon" href="https://storage.googleapis.com/gpt-engineer-file-uploads/xQl55EIDY6U5FPZIuIyVYXyHYIh2/uploads/1757568761223-DBSGSVzaSNCy2NtUPmpRbEjVW7kLaUu6mev3fkwu (1).png">
    
    <!-- iOS 26 Safari Critical Fix - MUST load before anything else -->
    <script src="/ios26-fix.js"></script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
